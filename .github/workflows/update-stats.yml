name: Update Lotto Stats

on:
  schedule:
    - cron: '0 12 * * 6' # 매주 토요일 12:00 UTC (21:00 KST)
  workflow_dispatch: # GitHub 웹 UI에서 수동 실행 가능

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update lotto data
        run: node scripts/update-stats.js

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/stats.ts src/data/history.ts
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update lotto statistics" && git push)
